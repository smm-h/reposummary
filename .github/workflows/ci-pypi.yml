name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Per-SHA group: re-runs of the same commit dedupe, but a new commit never
# cancels an earlier commit's in-flight run (release CI conclusions stay intact).
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # The PyPI wrapper lives in ./pypi/ (path-based target); run all steps there so
    # uv finds pyproject.toml + uv.lock. (The publish.yml pypi job does the same.)
    defaults:
      run:
        working-directory: ./pypi/
    strategy:
      matrix:
        # requires-python: >= 3.8
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run python -c "import reposummary"
      - run: uv run pytest
